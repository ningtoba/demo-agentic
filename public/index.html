<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #475569;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #1e1b4b 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .stat-card .label {
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card.priority-low .value { color: var(--success); }
    .stat-card.priority-medium .value { color: var(--warning); }
    .stat-card.priority-high .value { color: var(--danger); }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 0.4rem 0.8rem;
      font-size: 0.875rem;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.875rem;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .task-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: all 0.3s;
      animation: slideIn 0.3s ease-out;
    }

    .task-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }

    .task-card.completed {
      opacity: 0.6;
    }

    .task-card.completed .task-title {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .task-title {
      font-size: 1.25rem;
      font-weight: 600;
      flex: 1;
    }

    .task-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .task-description {
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .task-meta {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-low { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .badge-medium { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .badge-high { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

    .due-date {
      color: var(--text-secondary);
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .due-date.overdue {
      color: var(--danger);
      font-weight: 600;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
      cursor: pointer;
      accent-color: var(--success);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 90%;
      max-width: 500px;
      animation: slideUp 0.3s ease-out;
    }

    .modal h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-card);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 2000;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow);
      animation: slideInRight 0.3s ease-out;
      font-size: 0.95rem;
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    /* Animations */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      body { padding: 1rem 0.5rem; }
      header h1 { font-size: 2rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .task-header { flex-direction: column; gap: 0.75rem; }
      .task-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Dashboard</h1>
      <p>Organize your work, track your progress</p>
    </header>

    <div id="stats" class="stats-grid"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="openModal()">
        <span>+</span> Add Task
      </button>
    </div>

    <div id="taskList" class="task-list"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay" style="display: none;" onclick="closeModalOutside(event)">
    <div class="modal">
      <h2 id="modalTitle">New Task</h2>
      <form id="taskForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description"></textarea>
        </div>
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="dueDate">Due Date</label>
          <input type="date" id="dueDate">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API = '/api';
    let tasks = [];

    // Fetch tasks
    async function fetchTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        const data = await res.json();
        tasks = data.tasks;
        renderTasks();
      } catch (err) {
        showToast('Failed to load tasks', 'error');
      }
    }

    // Fetch stats
    async function fetchStats() {
      try {
        const res = await fetch(`${API}/stats`);
        const stats = await res.json();
        renderStats(stats);
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    // Render stats
    function renderStats(stats) {
      const statsEl = document.getElementById('stats');
      statsEl.innerHTML = `
        <div class="stat-card">
          <div class="value">${stats.total}</div>
          <div class="label">Total Tasks</div>
        </div>
        <div class="stat-card">
          <div class="value">${stats.completed}</div>
          <div class="label">Completed</div>
        </div>
        <div class="stat-card priority-low">
          <div class="value">${stats.by_priority.low}</div>
          <div class="label">Low Priority</div>
        </div>
        <div class="stat-card priority-medium">
          <div class="value">${stats.by_priority.medium}</div>
          <div class="label">Medium Priority</div>
        </div>
        <div class="stat-card priority-high">
          <div class="value">${stats.by_priority.high}</div>
          <div class="label">High Priority</div>
        </div>
      `;
    }

    // Render tasks
    function renderTasks() {
      const listEl = document.getElementById('taskList');

      if (tasks.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
            </svg>
            <h3>No tasks yet</h3>
            <p>Create your first task to get started!</p>
          </div>
        `;
        return;
      }

      listEl.innerHTML = tasks.map(task => {
        const isOverdue = task.due_date && new Date(task.due_date) < new Date() && !task.completed;
        return `
          <div class="task-card ${task.completed ? 'completed' : ''}">
            <div class="task-header">
              <div class="task-title">${escapeHtml(task.title)}</div>
              <div class="task-actions">
                <div class="checkbox-wrapper">
                  <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id}, this.checked)">
                  <span>${task.completed ? 'Done' : 'Mark Done'}</span>
                </div>
                <button class="btn btn-sm btn-secondary" onclick="openEditModal(${task.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">Delete</button>
              </div>
            </div>
            ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
            <div class="task-meta">
              <span class="badge badge-${task.priority}">${task.priority}</span>
              ${task.due_date ? `
                <span class="due-date ${isOverdue ? 'overdue' : ''}">
                  📅 ${formatDate(task.due_date)}
                  ${isOverdue ? '(Overdue)' : ''}
                </span>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // Create task
    async function createTask(data) {
      try {
        const res = await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Failed to create task');
        await fetchTasks();
        await fetchStats();
        showToast('Task created successfully', 'success');
      } catch (err) {
        showToast('Failed to create task', 'error');
      }
    }

    // Update task
    async function updateTask(id, data) {
      try {
        const res = await fetch(`${API}/tasks/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Failed to update task');
        await fetchTasks();
        await fetchStats();
        showToast('Task updated successfully', 'success');
      } catch (err) {
        showToast('Failed to update task', 'error');
      }
    }

    // Delete task
    async function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) return;
      try {
        const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete task');
        await fetchTasks();
        await fetchStats();
        showToast('Task deleted', 'success');
      } catch (err) {
        showToast('Failed to delete task', 'error');
      }
    }

    // Toggle complete
    async function toggleComplete(id, completed) {
      try {
        await updateTask(id, { completed });
      } catch (err) {
        showToast('Failed to update task', 'error');
      }
    }

    // Modal functions
    function openModal() {
      document.getElementById('modalTitle').textContent = 'New Task';
      document.getElementById('taskForm').reset();
      document.getElementById('editId').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function openEditModal(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      document.getElementById('modalTitle').textContent = 'Edit Task';
      document.getElementById('editId').value = task.id;
      document.getElementById('title').value = task.title;
      document.getElementById('description').value = task.description;
      document.getElementById('priority').value = task.priority;
      document.getElementById('dueDate').value = task.due_date || '';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function closeModalOutside(event) {
      if (event.target === document.getElementById('modal')) {
        closeModal();
      }
    }

    // Form submit
    async function handleSubmit(event) {
      event.preventDefault();

      const editId = document.getElementById('editId').value;
      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        priority: document.getElementById('priority').value,
        due_date: document.getElementById('dueDate').value || null
      };

      if (editId) {
        await updateTask(Number(editId), data);
      } else {
        await createTask(data);
      }

      closeModal();
    }

    // Toast notifications
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100px)';
        toast.style.transition = 'all 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Helpers
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Initialize
    fetchTasks();
    fetchStats();
    setInterval(fetchStats, 30000); // Refresh stats every 30s
  </script>
</body>
</html>
